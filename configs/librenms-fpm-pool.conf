; LibreNMS PHP-FPM Pool Configuration
; /etc/php/8.5/fpm/pool.d/librenms.conf
;
; Copied from www.conf and modified for LibreNMS.
; Replace 8.5 with your actual PHP version if different.

[librenms]

; Run PHP-FPM worker processes as the librenms user/group
; This matches the ownership of /opt/librenms and its files
user = librenms
group = librenms

; Unix socket path — must match the fastcgi_pass value in nginx config
; IMPORTANT: listen.owner/listen.group must be www-data (not librenms)
; so that nginx (which runs as www-data) can access the socket.
; user/group above controls what user PHP processes run as — separate concern.
listen = /run/php/php-fpm-librenms.sock
listen.owner = www-data
listen.group = www-data

; Process manager — dynamic spawns workers as needed
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Logging
php_admin_value[error_log] = /var/log/fpm-php.www.log
php_admin_flag[log_errors] = on
