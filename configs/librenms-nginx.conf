# LibreNMS Nginx Configuration
# /etc/nginx/conf.d/librenms.conf
#
# Replace YOUR_HOST_ONLY_IP with your server's actual Host-only adapter IP.
# Run 'ip a' on the server to find it (typically 192.168.56.x in VirtualBox).
#
# After editing, test with: sudo nginx -t
# Apply with: sudo systemctl restart nginx

server {
    listen      80;
    server_name YOUR_HOST_ONLY_IP;
    root        /opt/librenms/html;
    index       index.php;

    charset utf-8;

    # Compress responses for faster load times
    gzip on;
    gzip_types text/css application/javascript text/javascript application/x-javascript image/svg+xml text/plain text/xsl text/xml image/x-icon;

    # Route all requests through index.php (Laravel routing)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP requests to PHP-FPM via Unix socket
    # Socket path must match listen = value in librenms-fpm-pool.conf
    location ~ [^/]\.php(/|$) {
        fastcgi_pass unix:/run/php/php-fpm-librenms.sock;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi.conf;
    }

    # Block access to hidden files (e.g. .env, .git)
    # This prevents accidental exposure of credentials and config
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
